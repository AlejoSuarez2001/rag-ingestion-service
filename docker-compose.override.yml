networks:
  traefik:
    name: traefik-net
    external: true
  internal:
    internal: true

volumes:
  postgres_data:
  qdrant_data:
  hf_cache:

services:
  ingestion:
    container_name: rag-ingestion

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rag-ingestion.rule=Host(`rag-ingestion-dev.frba.utn.edu.ar`)"
      - "traefik.http.routers.rag-ingestion.entrypoints=websecure"
      - "traefik.http.routers.rag-ingestion.tls=true"
      - "traefik.http.services.rag-ingestion.loadbalancer.server.port=8001"

    env_file: .env
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      EMBEDDING_DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - traefik
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8001:8001"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres-rag
    networks:
      - internal
    environment:
      POSTGRES_DB: rag_ingestion
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_ingestion"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant-rag
    networks:
      - internal                                                                                                                                                                            
      - traefik   
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
